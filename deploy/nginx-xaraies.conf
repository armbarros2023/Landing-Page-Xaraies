server {
    listen 80;
    listen [::]:80;

    server_name __SERVER_NAMES__;

    root /var/www/xaraies-landing;
    index index.html;

    access_log /var/log/nginx/xaraies-landing.access.log;
    error_log  /var/log/nginx/xaraies-landing.error.log;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Cache para imagens, fontes e arquivos estáticos
    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Segurança básica
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Compressão
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
